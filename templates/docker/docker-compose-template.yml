version: "3"

services:
  {{.ServiceName}}:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        "PRVT_KEY": "{{.PrivateKeyPath}}"
        "MAIN_PATH": "{{.MainPath}}"
    ports:
      - "10001:10001"
    networks:
      - default
    restart: always
    {{if .EnvFile}}env_file: {{.EnvFile}}{{end}}
    {{if .Database}}environment:
      "APP_DATABASE": "postgres://postgres:example@database:5432/postgres?sslmode=disable"
    depends_on:
      - database
    command: sh -c "sleep 5s && /root/app"{{end}}
  jaeger:
    image: jaegertracing/all-in-one:1.47
    ports:
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "14250:14250"
      - "14268:14268"
      - "14269:14269"
      - "9411:9411"
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
      - COLLECTOR_OTLP_ENABLED: true
  {{if .Database}}database:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      PGDATA: /data/postgres
    ports:
      - "5432:5432"
    networks:
      - default
  {{end}}